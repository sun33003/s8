name: OneCloud 精简SSR版

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TAG_NAME: onecloud-${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init environment
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set Bypass Router IP (192.168.222.8)
        run: |
          cd openwrt
          sed -i "s/192.168.1.1/192.168.222.8/g" package/base-files/files/bin/config_generate || true

          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-bypass <<'EOF'
#!/bin/sh
uci set network.lan.ipaddr='192.168.222.8'
uci set network.lan.gateway='192.168.222.1'
uci set network.lan.dns='192.168.222.1'
uci commit network
exit 0
EOF
          chmod +x files/etc/uci-defaults/99-bypass

      - name: Load custom config
        run: |
          cd openwrt
          cat > .config <<'EOF'
# =========================
# Target (OneCloud meson8b)
# =========================
CONFIG_TARGET_meson=y
CONFIG_TARGET_meson_meson8b=y
CONFIG_TARGET_meson_meson8b_DEVICE_onecloud=y

# =========================
# Base
# =========================
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-mod-admin-full=y
CONFIG_PACKAGE_luci-theme-bootstrap=y
CONFIG_PACKAGE_dnsmasq-full=y
CONFIG_PACKAGE_firewall4=y
CONFIG_PACKAGE_ip-full=y
CONFIG_PACKAGE_iptables-nft=y
CONFIG_PACKAGE_kmod-ipt-tproxy=y
CONFIG_PACKAGE_iptables-mod-tproxy=y

# =========================
# SSR Plus Full
# =========================
CONFIG_PACKAGE_luci-app-ssr-plus=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Rust_Client=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray_Plugin=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ChinaDNS_NG=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Trojan=y
CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Kcptun=y

# =========================
# NAS Auto Mount
# =========================
CONFIG_PACKAGE_block-mount=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-vfat=y
CONFIG_PACKAGE_kmod-fs-ntfs3=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_lsblk=y
CONFIG_PACKAGE_fdisk=y
CONFIG_PACKAGE_samba4-server=y
CONFIG_PACKAGE_luci-app-samba4=y

# =========================
# Remove extras
# =========================
# CONFIG_PACKAGE_luci-app-dockerman is not set
# CONFIG_PACKAGE_luci-app-openclash is not set
# CONFIG_PACKAGE_luci-app-aria2 is not set
# CONFIG_PACKAGE_luci-app-ttyd is not set
# CONFIG_PACKAGE_luci-app-upnp is not set
# CONFIG_PACKAGE_luci-app-qos is not set
# CONFIG_PACKAGE_luci-app-statistics is not set
# CONFIG_PACKAGE_luci-app-nlbwmon is not set
EOF

          make defconfig

      - name: Patch SSR polling removal
        run: |
          cd openwrt
          sed -i '/XHR.poll/d' \
            package/*/luci-app-ssr-plus/htdocs/luci-static/resources/view/shadowsocksr/*.js 2>/dev/null || true
          sed -i '/setInterval/d' \
            package/*/luci-app-ssr-plus/htdocs/luci-static/resources/view/shadowsocksr/*.js 2>/dev/null || true

      - name: Add NAS automount script
        run: |
          cd openwrt
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-auto-mount <<'EOF'
#!/bin/sh
uci set fstab.@global[0].anon_mount='1'
uci set fstab.@global[0].auto_mount='1'
uci set fstab.@global[0].auto_swap='1'
uci set fstab.@global[0].check_fs='0'
uci commit fstab
exit 0
EOF
          chmod +x files/etc/uci-defaults/99-auto-mount

      - name: Download
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Package OneCloud Direct Flash
        run: |
          cd openwrt/bin/targets/meson/meson8b
          ls -lh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: onecloud-openwrt-ultimate
          path: openwrt/bin/targets/meson/meson8b/*

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG_NAME }}
          name: OneCloud OpenWrt ${{ env.TAG_NAME }}
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifacts: openwrt/bin/targets/meson/meson8b/*

