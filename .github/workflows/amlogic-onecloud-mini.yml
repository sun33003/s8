name: OneCloud 精简SSR版

on:
  workflow_dispatch:
    inputs:
      OP_IP:
        description: '玩客云IP'
        required: true
        default: '192.168.222.8'
        type: string
      SERVER_IP:
        description: '主路由IP'
        required: true
        default: '192.168.222.1'
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: 清理空间
      uses: rmoyulong/free-disk-space@main

    - name: 拉取当前仓库
      uses: actions/checkout@v4

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev \
        libssl-dev python3 python3-pip rsync unzip zlib1g-dev \
        file wget

    - name: 克隆 OpenWrt
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 写入极简配置
      run: |
        cd openwrt
        cat > .config <<EOF
        CONFIG_TARGET_meson8b=y
        CONFIG_TARGET_meson8b_DEVICE_generic=y

        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-mod-admin-full=y
        CONFIG_PACKAGE_luci-theme-bootstrap=y

        CONFIG_PACKAGE_dnsmasq-full=y
        CONFIG_PACKAGE_firewall4=y

        # === SSR Plus ===
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Rust_Client=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ChinaDNS_NG=y

        # === NAS ===
        CONFIG_PACKAGE_samba4-server=y
        CONFIG_PACKAGE_luci-app-samba4=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_kmod-fs-ntfs3=y
        EOF

        make defconfig

    - name: 设置默认IP
      run: |
        cd openwrt
        mkdir -p files/etc/config

        cat > files/etc/config/network <<EOF
        config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'
            option netmask '255.0.0.0'

        config device
            option name 'br-lan'
            option type 'bridge'

        config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '${{ github.event.inputs.OP_IP }}'
            option netmask '255.255.255.0'
            option gateway '${{ github.event.inputs.SERVER_IP }}'
            option dns '${{ github.event.inputs.SERVER_IP }}'
        EOF

    - name: 去掉SSR前端轮询
      run: |
        cd openwrt
        sed -i '/XHR.poll/d' \
        package/*/luci-app-ssr-plus/htdocs/luci-static/resources/view/shadowsocksr/*.js || true
        sed -i '/setInterval/d' \
        package/*/luci-app-ssr-plus/htdocs/luci-static/resources/view/shadowsocksr/*.js || true

    - name: 下载依赖
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: 编译
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: 上传固件
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: OpenWrt_SSR_$(date +"%Y%m%d%H%M")
        artifacts: openwrt/bin/targets/*/*/*
